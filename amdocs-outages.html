<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        :root {
            --bg: #0B0B0F;
            --bg-elevated: #141419;
            --text: #F0EDE6;
            --text-dim: #8A8680;
            --accent: #FF6B35;
            --accent2: #9B6BFF;
            --font-display: 'Montserrat', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            overflow-x: hidden;
            cursor: none;
        }

        /* Custom Cursor */
        .cursor {
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translate(-50%, -50%);
        }

        .cursor.hovering {
            transform: translate(-50%, -50%) scale(3.5);
        }

        /* Grain Overlay */
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(11, 11, 15, 0.85);
            border-bottom: 1px solid rgba(240, 237, 230, 0.08);
        }

        .nav-logo {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.02em;
            color: var(--text);
            text-decoration: none;
            position: relative;
            display: inline-block;
            height: 1.3em;
            overflow: hidden;
            width: 2.5ch;
            transition: width 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .nav-logo:hover { width: 16ch; }
        .nav-logo .logo-short {
            display: block;
            white-space: nowrap;
            transition: opacity 0.15s ease;
        }
        .nav-logo .logo-full {
            position: absolute;
            left: 0; top: 0;
            display: block;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .nav-logo:hover .logo-short { opacity: 0; }
        .nav-logo:hover .logo-full { opacity: 1; }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        /* Hero */
        .hero {
            padding: 160px 48px 60px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent2);
            text-decoration: none;
            margin-bottom: 32px;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 0.7;
        }

        .hero h1 {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(40px, 8vw, 80px);
            line-height: 1.05;
            color: var(--text);
            margin-bottom: 12px;
        }

        .hero .year {
            font-family: var(--font-body);
            font-size: 18px;
            color: var(--text-dim);
            font-weight: 400;
        }

        /* Image Gallery */
        .gallery {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 48px 80px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .gallery img {
            width: 100%;
            display: block;
            border-radius: 12px;
        }

        /* Scroll Reveal */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* You May Also Like */
        .also-like {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 48px 100px;
        }

        .also-like h2 {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 24px;
            color: var(--text);
            margin-bottom: 40px;
        }

        .also-like-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .also-like-card {
            text-decoration: none;
            color: var(--text);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .also-like-card:hover {
            transform: translateY(-6px);
        }

        .also-like-card img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border-radius: 12px;
            display: block;
            margin-bottom: 12px;
        }

        .also-like-card .card-title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 15px;
        }

        .also-like-card .card-year {
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* Footer */
        footer {
            border-top: 1px solid rgba(240, 237, 230, 0.08);
            padding: 32px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-copy {
            font-size: 13px;
            color: var(--text-dim);
        }

        .footer-socials {
            display: flex;
            gap: 12px;
        }

        .footer-socials a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(240, 237, 230, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s, background 0.3s;
        }

        .footer-socials a:hover {
            border-color: rgba(240, 237, 230, 0.4);
            background: rgba(240, 237, 230, 0.05);
        }

        .footer-socials svg {
            width: 16px;
            height: 16px;
            fill: var(--text-dim);
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 16px 24px;
            }

            .hero {
                padding: 140px 24px 40px;
            }

            .gallery {
                padding: 0 24px 60px;
                gap: 20px;
            }

            .also-like {
                padding: 40px 24px 80px;
            }

            .also-like-grid {
                grid-template-columns: 1fr;
                gap: 32px;
            }

            footer {
                padding: 24px;
                flex-direction: column;
                gap: 16px;
            }

            .cursor {
                display: none;
            }

            body {
                cursor: auto;
            }
        }
    </style>

    <script>
        // Custom Cursor
        const cursor = document.querySelector('.cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
        });

        // Scroll Reveal
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
