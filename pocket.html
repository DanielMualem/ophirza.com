  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%97%86</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0B0B0F;
      --bg-elevated: #141419;
      --text: #F0EDE6;
      --text-dim: #8A8680;
      --accent: #FF6B35;
      --accent2: #9B6BFF;
      --accent-glow: rgba(255, 107, 53, 0.15);
      --accent2-glow: rgba(155, 107, 255, 0.15);
      --sand: #C4B5A0;
      --border: rgba(240, 237, 230, 0.08);
      --font-display: 'Montserrat', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html {
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--bg);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
      cursor: none;
    }

    ::selection {
      background: var(--accent);
      color: var(--bg);
    }

    a { color: inherit; text-decoration: none; cursor: none; }
    img { display: block; max-width: 100%; }
    button { cursor: none; }

    /* ========== CUSTOM CURSOR ========== */
    .cursor {
      position: fixed;
      top: 0; left: 0;
      width: 16px; height: 16px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
      transition: transform 0.15s ease;
      transform: translate(-50%, -50%);
    }
    .cursor.hovering { transform: translate(-50%, -50%) scale(3.5); }

    @media (pointer: coarse) {
      .cursor { display: none; }
      body, a, button { cursor: auto; }
    }

    /* ========== GRAIN OVERLAY ========== */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px;
    }

    /* ========== NAV ========== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      background: rgba(11, 11, 15, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      transition: opacity 0.4s;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--text);
      position: relative;
      display: inline-block;
      height: 1.3em;
      overflow: hidden;
      width: 2.5ch;
      transition: width 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-logo:hover { width: 16ch; }

    .nav-logo .logo-short {
      display: block;
      white-space: nowrap;
      transition: opacity 0.15s ease;
    }

    .nav-logo .logo-full {
      position: absolute;
      left: 0; top: 0;
      display: block;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .nav-logo:hover .logo-short { opacity: 0; }
    .nav-logo:hover .logo-full { opacity: 1; }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-links a {
      position: relative;
      color: var(--text);
      transition: color 0.3s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after { width: 100%; }

    /* ========== HERO ========== */
    .hero {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 40px 80px;
      position: relative;
    }

    .hero-bg-line {
      position: absolute;
      top: 0; left: 50%;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, var(--border) 30%, var(--border) 70%, transparent);
    }

    .hero-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(52px, 10vw, 140px);
      line-height: 0.9;
      letter-spacing: -0.04em;
      margin-bottom: 24px;
    }

    .hero-name .line {
      display: block;
      overflow: hidden;
    }

    .hero-name .line span {
      display: inline-block;
      opacity: 0;
      transform: translateY(100%);
      animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .hero-name .line:nth-child(1) span { animation-delay: 0.1s; }

    .accent { color: var(--accent2); }

    .hero-meta {
      display: flex;
      align-items: center;
      gap: 32px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .hero-year {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .hero-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent2);
      transition: color 0.3s, gap 0.3s;
    }

    .hero-back:hover {
      color: var(--accent);
      gap: 12px;
    }

    .hero-back svg {
      width: 16px; height: 16px;
      stroke: currentColor;
      transition: transform 0.3s;
    }

    .hero-back:hover svg {
      transform: translateX(-4px);
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== SCROLL REVEAL ========== */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ========== IMAGE GALLERY ========== */
    .gallery {
      padding: 40px 40px 120px;
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
    }

    /* ========== YOU MAY ALSO LIKE ========== */
    .related {
      padding: 80px 40px 120px;
      position: relative;
    }

    .section-label {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 48px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-label::before {
      content: '';
      width: 40px; height: 1px;
      background: var(--accent);
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    .related-card {
      display: block;
      transition: transform 0.4s ease;
    }

    .related-card:hover {
      transform: translateY(-6px);
    }

    .related-thumb {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 16px;
      transition: filter 0.4s;
    }

    .related-card:hover .related-thumb {
      filter: brightness(1.1);
    }

    .related-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
      transition: color 0.3s;
    }

    .related-card:hover .related-title {
      color: var(--accent);
    }

    .related-year {
      font-size: 14px;
      color: var(--text-dim);
    }

    /* ========== FOOTER ========== */
    footer {
      padding: 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-left {
      font-size: 13px;
      color: var(--text-dim);
    }

    .footer-socials {
      display: flex;
      gap: 24px;
    }

    .footer-socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border: 1px solid var(--border);
      border-radius: 50%;
      transition: all 0.3s;
    }

    .footer-socials a:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .footer-socials a svg {
      width: 16px; height: 16px;
      fill: var(--text-dim);
      transition: fill 0.3s;
    }

    .footer-socials a:hover svg { fill: var(--accent); }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 900px) {
      nav { padding: 20px 24px; }
      .nav-links { gap: 20px; }
      .hero { padding: 0 24px 60px; }
      .gallery { padding: 24px 24px 80px; gap: 24px; }
      .related { padding: 60px 24px 80px; }
      .related-grid { grid-template-columns: 1fr 1fr; }
      footer { padding: 32px 24px; flex-direction: column; gap: 24px; }
    }

    @media (max-width: 600px) {
      .nav-links { gap: 16px; font-size: 11px; }
      .related-grid { grid-template-columns: 1fr; max-width: 360px; }
      .hero-meta { flex-direction: column; align-items: flex-start; gap: 16px; }
    }
  </style>
</head>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  const interactives = document.querySelectorAll('a, button');

  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  interactives.forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
  });

  // Scroll reveal
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 80);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  reveals.forEach(el => observer.observe(el));
</script>
