    <style>
        :root {
            --bg: #0B0B0F;
            --bg-elevated: #141419;
            --text: #F0EDE6;
            --text-dim: #8A8680;
            --accent: #FF6B35;
            --accent2: #9B6BFF;
            --font-display: 'Montserrat', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --border: rgba(240,237,230,0.08);
            --accent-glow: rgba(255,107,53,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            cursor: none;
            overflow-x: hidden;
        }

        /* Custom Cursor */
        .cursor {
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.2s ease;
            transform: translate(-50%, -50%);
        }
        .cursor.hovering { transform: translate(-50%, -50%) scale(3.5); }

        /* Grain Overlay */
        .grain {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.035;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(11,11,15,0.85);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.02em;
            color: var(--text);
            text-decoration: none;
            position: relative;
            display: inline-block;
            height: 1.3em;
            overflow: hidden;
            width: 2.5ch;
            transition: width 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .nav-logo:hover { width: 16ch; }
        .nav-logo .logo-short {
            display: block;
            white-space: nowrap;
            transition: opacity 0.15s ease;
        }
        .nav-logo .logo-full {
            position: absolute;
            left: 0; top: 0;
            display: block;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .nav-logo:hover .logo-short { opacity: 0; }
        .nav-logo:hover .logo-full { opacity: 1; }

        .nav-links { display: flex; gap: 32px; }
        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 400;
            transition: color 0.3s ease;
        }
        .nav-links a:hover { color: var(--text); }

        /* Hero */
        .hero {
            padding: 160px 40px 60px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--accent2);
            text-decoration: none;
            margin-bottom: 24px;
            transition: opacity 0.3s ease;
        }
        .back-link:hover { opacity: 0.7; }

        .hero h1 {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(40px, 8vw, 80px);
            line-height: 1.05;
            color: var(--text);
        }

        .hero .year {
            font-family: var(--font-body);
            font-size: 16px;
            color: var(--text-dim);
            margin-top: 12px;
        }

        /* Gallery */
        .gallery {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px 80px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .gallery img {
            width: 100%;
            border-radius: 12px;
            display: block;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            border-radius: 12px;
            overflow: hidden;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Scroll Reveal */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* You May Also Like */
        .also-like {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 40px 80px;
            border-top: 1px solid var(--border);
        }

        .also-like h2 {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 24px;
            color: var(--text);
            margin-bottom: 40px;
        }

        .also-like-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .also-like-card {
            text-decoration: none;
            color: var(--text);
            transition: transform 0.3s ease;
        }
        .also-like-card:hover { transform: translateY(-4px); }

        .also-like-card img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 12px;
            display: block;
            margin-bottom: 12px;
        }

        .also-like-card .card-title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 16px;
        }

        .also-like-card .card-year {
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer .copyright {
            font-size: 13px;
            color: var(--text-dim);
        }

        .social-links { display: flex; gap: 16px; }
        .social-links a {
            color: var(--text-dim);
            transition: color 0.3s ease;
        }
        .social-links a:hover { color: var(--text); }
        .social-links svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav { padding: 16px 20px; }
            .hero { padding: 140px 20px 40px; }
            .gallery { padding: 0 20px 60px; gap: 20px; }
            .also-like { padding: 40px 20px 60px; }
            .also-like-grid { grid-template-columns: 1fr; gap: 32px; }
            footer { padding: 20px; flex-direction: column; gap: 12px; }
        }
    </style>
</head>

<script>
    // Custom cursor
    const cursor = document.querySelector('.cursor');
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });
    document.querySelectorAll('a, button').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
    });

    // Scroll reveal
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
